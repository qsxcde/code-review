services:
  # ────────────────────────────────────────────────────────────
  # MySQL 8.0
  # ────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: code-review-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: code_review
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ────────────────────────────────────────────────────────────
  # Redis 7
  # ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: code-review-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ────────────────────────────────────────────────────────────
  # FastAPI backend
  # ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: code-review-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ────────────────────────────────────────────────────────────
  # Vue frontend + nginx
  # ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    container_name: code-review-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

# ──────────────────────────────────────────────────────────────
volumes:
  mysql_data:
  redis_data:
